<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Analytics Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 3L8 13L13 8L21 21" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" />
          <defs>
            <linearGradient id="gradient" x1="3" y1="3" x2="21" y2="21">
              <stop offset="0%" style="stop-color:#8B5CF6" />
              <stop offset="100%" style="stop-color:#EC4899" />
            </linearGradient>
          </defs>
        </svg>
        <h1>Instagram Analytics Pro</h1>
      </div>
    </header>

    <div class="warning-banner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M12 9V13M12 17H12.01M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <span>You must be logged into Instagram for this to work</span>
    </div>

    <nav class="tabs">
      <button class="tab-button active" data-tab="non-followers">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M16 21V19C16 17.9391 15.5786 16.9217 14.8284 16.1716C14.0783 15.4214 13.0609 15 12 15H5C3.93913 15 2.92172 15.4214 2.17157 16.1716C1.42143 16.9217 1 17.9391 1 19V21M23 11L20 8M20 8L17 11M20 8V16"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          <path
            d="M12.5 7C12.5 9.20914 10.7091 11 8.5 11C6.29086 11 4.5 9.20914 4.5 7C4.5 4.79086 6.29086 3 8.5 3C10.7091 3 12.5 4.79086 12.5 7Z"
            stroke="currentColor" stroke-width="2" />
        </svg>
        Non-Followers
      </button>
    </nav>

    <div class="tab-content active" id="non-followers-tab">
      <div class="stats-card">
        <div class="stat-item">
          <span class="stat-label">Following</span>
          <span class="stat-value" id="following-count">-</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Followers</span>
          <span class="stat-value" id="followers-count">-</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Not Following Back</span>
          <span class="stat-value highlight" id="non-followers-count">-</span>
        </div>
      </div>


      <button class="analyze-button" id="analyze-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        Find Non-Followers
      </button>

      <div class="results-controls" id="results-controls" style="display: none;">
        <input type="text" id="search-input" class="search-input" placeholder="Search usernames...">
      </div>

      <div class="results" id="non-followers-results">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
            <path d="M12 6V12L16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          <p>Click "Find Non-Followers" to start analysis</p>
        </div>
      </div>
    </div>

    <div class="loading-overlay hidden" id="loading-overlay">
      <div class="loading-content">
        <div class="spinner"></div>
        <p id="loading-text">Analyzing...</p>
        <p class="loading-subtext" id="loading-subtext">This may take a few moments</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
